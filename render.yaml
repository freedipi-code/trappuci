services:
  - type: web
    name: telegram-shop-bot
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma db push
    startCommand: npm start
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: ADMIN_ID
        sync: false
      - key: BOT_MODE
        value: webhook
      - key: WEBHOOK_DOMAIN
        sync: false
      - key: WEBHOOK_PATH
        value: /api/telegram/webhook
      - key: WEBHOOK_SECRET
        sync: false
      - key: BTC_WALLET
        sync: false
      - key: LTC_WALLET
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: telegram-shop-db
          property: connectionString

databases:
  - name: telegram-shop-db-4rm0
    plan: basic-256mb
    databaseName: telegram_shop
